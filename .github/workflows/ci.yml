name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Validate plugin.json
        run: |
          if [ ! -f ".claude-plugin/plugin.json" ]; then
            echo "ERROR: .claude-plugin/plugin.json not found"
            exit 1
          fi
          echo "plugin.json found"
          cat .claude-plugin/plugin.json | python3 -m json.tool > /dev/null
          echo "plugin.json is valid JSON"

      - name: Validate plugin structure
        run: |
          echo "Checking required directories..."
          for dir in skills commands agents templates schemas; do
            if [ -d "$dir" ]; then
              echo "  Found: $dir/"
            else
              echo "ERROR: required directory '$dir/' not found"
              exit 1
            fi
          done

          echo "Checking skill structure..."
          shopt -s nullglob
          skill_count=0
          for skill in skills/*/SKILL.md; do
            echo "  Found: $skill"
            skill_count=$((skill_count + 1))
          done
          if [ "$skill_count" -eq 0 ]; then
            echo "ERROR: no skills/*/SKILL.md files found"
            exit 1
          fi

      - name: Validate JSON schemas
        run: |
          for schema in schemas/*.json; do
            echo "Checking: $schema"
            python3 -m json.tool "$schema" > /dev/null
          done

  docs-freshness:
    runs-on: ubuntu-latest
    steps:
      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # yamllint disable-line rule:line-length
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Check generated docs are fresh
        working-directory: site
        run: npm run check:freshness
