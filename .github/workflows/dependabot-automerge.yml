# Dependabot Auto-Merge
# Automatically approves and merges Dependabot PRs after CI passes
#
# This workflow calls the centralized auto-merge workflow from zircote/.github
# Requires repository setting "Allow auto-merge" to be enabled

name: Dependabot Auto-Merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    # yamllint disable-line rule:line-length
    uses: zircote/.github/.github/workflows/reusable-dependabot-automerge.yml@aa00b2f09e8e42bd88cd002b441fcd6c46ecaff8  # main
    secrets: inherit
